<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixel Pets</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <div class="header-row">
          <h1>🐾 Pixel Pets</h1>
          <button id="btn-throw-ball" class="btn-icon" title="Throw ball on page">🎾</button>
        </div>
        <p class="subtitle">Your pixel companions on every page</p>
      </header>

      <section id="pets-list">
        <!-- Populated by popup.ts -->
      </section>

      <section id="add-pet-form">
        <h2>Add a new pet</h2>
        <div class="form-grid">
          <label for="pet-name">Name</label>
          <input type="text" id="pet-name" placeholder="Rex" maxlength="16" />

          <label for="pet-type">Type</label>
          <select id="pet-type">
            <option value="dog">🐕 Dog</option>
            <option value="fox">🦊 Fox</option>
          </select>

          <label for="pet-color">Color</label>
          <select id="pet-color">
            <!-- Options populated dynamically based on type -->
          </select>
        </div>

        <div class="preview-row">
          <img id="preview-img" alt="Pet preview" />
          <button id="btn-add" class="btn-primary">Add Pet</button>
        </div>
      </section>

      <footer>
        <p>Click a pet to feed · Double-click page to throw ball</p>
      </footer>
    </div>
    <script type="module" src="popup.ts"></script>
  </body>
</html>
