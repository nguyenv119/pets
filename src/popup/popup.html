<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixel Pets</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Pixel Pets</h1>
      </header>

      <section id="pets-list">
        <!-- Populated by popup.ts -->
      </section>

      <section id="add-pet-form">
        <h2>Add Pet</h2>
        <div class="form-row">
          <label for="pet-name">Name</label>
          <input type="text" id="pet-name" placeholder="Rex" maxlength="16" />
        </div>
        <div class="form-row">
          <label for="pet-type">Type</label>
          <select id="pet-type">
            <option value="dog">Dog</option>
            <option value="fox">Fox</option>
          </select>
        </div>
        <div class="form-row">
          <label for="pet-color">Color</label>
          <select id="pet-color">
            <!-- Options populated dynamically based on type -->
          </select>
        </div>
        <button id="btn-add" class="btn-primary">Add Pet</button>
      </section>

      <section id="actions">
        <button id="btn-throw-ball" class="btn-secondary">Throw Ball</button>
      </section>
    </div>
    <script type="module" src="popup.ts"></script>
  </body>
</html>
