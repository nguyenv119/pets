<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pets</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; }

      /* Ground top = pet feet level  ≈  50vh + 40px */
      :root { --ground-top: calc(50vh + 40px); }

      /* ── Sky ──────────────────────────────────────────────────── */
      #backdrop {
        position: fixed;
        inset: 0;
        background: linear-gradient(to bottom,
          #1a4a8c  0%,
          #3572be 12%,
          #5698d6 30%,
          #7dbae8 54%,
          #a8d8f5 72%
        );
        z-index: 0;
      }

      /* Pixel sun with cross rays */
      #sun {
        position: fixed;
        top: 7vh; right: 12%;
        width: 28px; height: 28px;
        background: #fff700;
        image-rendering: pixelated;
        z-index: 0;
        box-shadow:
          0 0 0 4px  #ffee00,
          0 0 0 10px rgba(255, 238, 0, 0.45),
          0 0 0 22px rgba(255, 230, 0, 0.15);
      }
      #sun::before {
        content: ''; position: absolute; background: #fff700;
        top: -10px; bottom: -10px; left: 3px; right: 3px;
      }
      #sun::after {
        content: ''; position: absolute; background: #fff700;
        top: 3px; bottom: 3px; left: -10px; right: -10px;
      }

      /* ── Pixel clouds — 3-level stepped shapes ──────────────── */
      .cloud {
        position: fixed;
        z-index: 0;
        image-rendering: pixelated;
        opacity: 0.97;
      }

      /* Cloud 1: large (8px×24px/pixel = 192×96px, 3 levels) */
      #cloud-1 {
        top: 9vh; left: 7%;
        width: 192px; height: 96px;
        background:
          linear-gradient(#fff, #fff)  72px    0 /  48px 24px no-repeat,
          linear-gradient(#fff, #fff)  24px   24px / 144px 24px no-repeat,
          linear-gradient(#fff, #fff)   0     48px / 192px 48px no-repeat;
        animation: drift-a 34s ease-in-out infinite;
      }
      /* Cloud 2: small (5px×20px/pixel = 100×60px, 2 levels) */
      #cloud-2 {
        top: 20vh; left: 30%;
        width: 100px; height: 60px;
        background:
          linear-gradient(#fff, #fff)  20px    0 /  60px 20px no-repeat,
          linear-gradient(#fff, #fff)   0     20px / 100px 40px no-repeat;
        animation: drift-b 24s ease-in-out infinite;
        animation-delay: -12s;
      }
      /* Cloud 3: medium (8px×18px/pixel = 144×72px, 3 levels) */
      #cloud-3 {
        top: 8vh; right: 22%;
        width: 144px; height: 72px;
        background:
          linear-gradient(#fff, #fff)  45px    0 /  54px 18px no-repeat,
          linear-gradient(#fff, #fff)  27px   18px /  90px 18px no-repeat,
          linear-gradient(#fff, #fff)   0     36px / 144px 36px no-repeat;
        animation: drift-a 28s ease-in-out infinite reverse;
        animation-delay: -9s;
      }

      @keyframes drift-a {
        0%, 100% { transform: translateX(0); }
        50%       { transform: translateX(26px); }
      }
      @keyframes drift-b {
        0%, 100% { transform: translateX(0); }
        50%       { transform: translateX(-20px); }
      }

      /* ── Ground ──────────────────────────────────────────────── */
      #ground {
        position: fixed;
        left: 0; width: 100%;
        top: var(--ground-top);
        bottom: 0;
        z-index: 0;
        /* Crisp grass → dark grass → dirt, all pixel-sharp */
        background: linear-gradient(to bottom,
          #72da62  0,
          #72da62  8px,
          #5ab84e  8px,
          #5ab84e  22px,
          #3e8040  22px,
          #3e8040  36px,
          #7c5438  36px,
          #6a4225  55%,
          #5a3618  100%
        );
      }

      /* Pixel grass blades — tall + medium, two separate heights */
      #ground::before {
        content: ''; position: absolute;
        top: -20px; left: 0; right: 0;
        height: 20px;
        background-image:
          /* Tall blades: 5 px wide every 16 px, full 20 px height */
          repeating-linear-gradient(90deg,
            #80e260 0 5px, transparent 5px 16px
          ),
          /* Medium blades: 4 px wide every 16 px, offset column */
          repeating-linear-gradient(90deg,
            transparent 0 8px, #5bb84e 8px 12px, transparent 12px 16px
          );
        background-position: 0 0, 0 6px;
        background-repeat: repeat, repeat-x;
        image-rendering: pixelated;
      }

      /* Dirt tile texture — 16×16 px grid visible only in dirt section */
      #ground::after {
        content: ''; position: absolute;
        top: 36px; left: 0; right: 0; bottom: 0;
        background:
          repeating-linear-gradient(0deg,
            rgba(0,0,0,0.09) 0 1px, transparent 1px 16px
          ),
          repeating-linear-gradient(90deg,
            rgba(0,0,0,0.07) 0 1px, transparent 1px 16px
          );
        pointer-events: none;
      }

      /* ── Scene sprites (houses + trees, no hedge) ───────────── */
      #scene-layer {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
      }
      .sprite {
        position: absolute;
        image-rendering: pixelated;
      }

      /* Sprites bottom-aligned to grass surface */
      #house-left  { width: 189px; left: 2%;   bottom: calc(100vh - var(--ground-top)); }
      #house-right { width: 228px; right: 2%;  bottom: calc(100vh - var(--ground-top)); }
      /* Trees sunk 12 px into ground so narrow trunk emerges from grass cleanly */
      #tree-1      { width: 156px; left: 17%;  bottom: calc(100vh - var(--ground-top) - 12px); }
      #tree-2      { width: 156px; right: 17%; bottom: calc(100vh - var(--ground-top) - 12px); }

      /* ── Pets layer ─────────────────────────────────────────── */
      #pets-layer {
        position: fixed;
        top: 0; left: 0;
        width: 100%;
        z-index: 1;
        pointer-events: none;
      }
      #pets-layer img {
        pointer-events: auto;
        cursor: pointer;
      }

      canvas {
        position: fixed;
        top: 0; left: 0;
        z-index: 2;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="backdrop"></div>
    <div id="sun"></div>
    <div class="cloud" id="cloud-1"></div>
    <div class="cloud" id="cloud-2"></div>
    <div class="cloud" id="cloud-3"></div>
    <div id="ground"></div>
    <div id="scene-layer">
      <img src="assets/sprites/house_left.png"  class="sprite" id="house-left"  alt="">
      <img src="assets/sprites/tree.png"         class="sprite" id="tree-1"      alt="">
      <img src="assets/sprites/tree.png"         class="sprite" id="tree-2"      alt="">
      <img src="assets/sprites/house_right.png" class="sprite" id="house-right" alt="">
    </div>
    <div id="pets-layer"></div>
    <canvas id="canvas"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
